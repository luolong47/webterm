name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: 代码检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 缓存 cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: 格式检查 (rustfmt)
        run: cargo fmt -- --check

      - name: Clippy 检查
        run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: 构建 (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: 构建 (debug)
        run: cargo build --verbose

      - name: 构建 (release)
        run: cargo build --release --verbose

  test:
    name: 端到端验收
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: 构建 release 产物
        run: cargo build --release

      - name: 启动 webterm 服务
        run: |
          ./target/release/webterm &
          echo $! > /tmp/webterm.pid
          for i in $(seq 1 20); do
            curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:7681 && break
            sleep 0.5
          done
          echo

      - name: 基础 HTTP 验证
        run: |
          # 验证主页返回 200 且包含 xterm 相关内容
          resp=$(curl -s http://127.0.0.1:7681)
          echo "$resp" | grep -qi 'xterm' && echo "✓ 主页包含 xterm.js 引用" || (echo "✗ 主页未包含 xterm.js"; exit 1)

      - name: 清理
        if: always()
        run: |
          kill $(cat /tmp/webterm.pid 2>/dev/null) 2>/dev/null || true
