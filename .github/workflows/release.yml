name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: 构建并发布 (linux/amd64, linux/arm64)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable

      - name: 安装交叉编译目标 (${{ matrix.target }})
        run: rustup target add ${{ matrix.target }}

      - name: 安装跨平台链接器 (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: 配置交叉编译链接器 (aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: 缓存 cargo 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-${{ runner.os }}-${{ matrix.target }}-

      - name: 构建 release 产物
        run: cargo build --release --target ${{ matrix.target }}

      - name: 打包二进制文件
        run: |
          mkdir -p dist
          binary_name="webterm-${{ github.ref_name }}-${{ matrix.target }}"
          cp target/${{ matrix.target }}/release/webterm "$binary_name"
          strip "$binary_name" 2>/dev/null || true
          tar czf "$binary_name.tar.gz" "$binary_name"
          echo "PACKAGE_PATH=$binary_name.tar.gz" >> $GITHUB_ENV
          echo "PACKAGE_NAME=$binary_name" >> $GITHUB_ENV

      - name: 上传产物
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: webterm ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/${{ env.PACKAGE_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
