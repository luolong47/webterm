<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>webterm</title>
  <link rel="stylesheet" href="vendor/xterm.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #000; font-family: monospace; overflow: hidden; }
    #terminal { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <!-- 密码认证覆盖层 -->
  <div id="auth-overlay">
    <div id="auth-box">
      <h2>webterm</h2>
      <p>请输入访问密码</p>
      <input type="password" id="auth-pass" autofocus autocomplete="off">
      <div id="auth-msg"></div>
    </div>
  </div>

  <div id="terminal"></div>
  <script src="vendor/xterm.js"></script>
  <script src="vendor/xterm-addon-fit.js"></script>
  <script src="main.js"></script>
</body>
</html>
